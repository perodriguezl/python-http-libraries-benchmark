name: Benchmark

on:
  schedule:
    - cron: '0 0 * * 0'  # Every Sunday at midnight UTC
  workflow_dispatch:
    inputs:
      python_version:
        description: 'Python version (e.g. 3.11, 3.12, 3.13)'
        required: false
        default: '3.12'
      num_runs:
        description: 'Number of benchmark runs'
        required: false
        default: '21'

jobs:
  benchmark:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version || '3.12' }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run benchmarks
        env:
          BENCHMARK_URL: http://127.0.0.1:8080
          BENCHMARK_RUNS: ${{ inputs.num_runs || '21' }}
        run: |
          python -m http.server 8080 --bind 0.0.0.0 &
          sleep 2
          python benchmark.py

      - name: Generate charts
        run: python benchmark_analytics.py

      - name: Commit results
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}
          git add -f benchmark_results.csv
          git add mean_requests_per_second.png mean_total_response_time.png mean_connection_time.png mean_tls_handshake_time.png
          git diff --staged --quiet || git commit -m "chore: update benchmark results [skip ci]"
          git push
